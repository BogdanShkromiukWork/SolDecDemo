<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="script.js"></script>
    <title>Soldec Demo</title>
</head>
<body>
    <div id="cover">
        <p id="introText">Hi, webapp SolDec is PC app, if you are already on PC you can just open it, if you are on a different device, you can send the link to your PC.</p>
        <div id="buttonsGrid">
            <button class="btn" id="goToAppBtn">Go to App</button>
            <button class="btn" id="copyLinkBtn"><img src="pictures/copy.png" class="btn_image"alt="Copy"></button>
            <button class="btn" id="sendLinkBtn"><img src="pictures/share.png" class="btn_image"alt="Share"></button>
        </div>
    </div>
